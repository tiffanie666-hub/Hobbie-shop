<!DOCTYPE html>
<html>
<head>
  <title>Hobbie Shop</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 60px;
    }
    .card {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 320px;
      margin: auto;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    h1 {
      color: #222;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: black;
      color: white;
      border-radius: 6px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Hobbie Shop</h1>
    <p>Everything for your hobbies & creativity</p>
    <button onclick="alert('Shop coming soon!')">Shop Now</button>
  </div>

</body>
</html>
